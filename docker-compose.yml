services:
  postgres:
    image: postgres:16-alpine
    container_name: sachar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sachar_medical
    ports:
      - "5432:5432"
    volumes:
      - sachar_pgdata:/var/lib/postgresql/data

volumes:
  sachar_pgdata:
